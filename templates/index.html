<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ตรวจสอบเอกสารความเสี่ยง</title>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <!-- Vanilla CSS -->
    <link rel="stylesheet" href="/static/css/global.css" />
    <link rel="stylesheet" href="/static/css/components/checklist.css" />
    <link rel="stylesheet" href="/static/css/components/verification.css" />

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <main class="app-container">
        <div class="max-w-6xl">
            <!-- Header -->
            <div class="header-section">
                <h2>ตรวจสอบเอกสาร PDF</h2>
                <p class="text-on-surface-variant text-md">อัปโหลดเอกสาร PDF และกำหนดเกณฑ์รายการตรวจสอบที่ต้องการ</p>
            </div>

            <!-- Main Layout Layout -->
            <div class="grid-layout">

                <!-- Left Section: Checklist Configuration -->
                <section class="grid-left checklist-card">
                    <div class="checklist-header">
                        <h3>กำหนดรายการตรวจสอบ</h3>
                        <button id="add-row-btn" class="add-row-btn">
                            <span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
                            เพิ่มแถว
                        </button>
                    </div>
                    <div class="table-wrapper">
                        <table class="excel-table">
                            <thead>
                                <tr>
                                    <th class="excel-row-index" style="text-align:center;">#</th>
                                    <th>หัวข้อหลัก</th>
                                    <th>รายการย่อยที่ต้องการ</th>
                                    <th style="width:80px; text-align:center; padding-right:1rem;">ลบ</th>
                                </tr>
                            </thead>
                            <tbody id="checklist-body">
                                <tr>
                                    <td class="excel-row-index">1</td>
                                    <td class="excel-cell">
                                        <input type="text" placeholder="หัวข้อหลัก" value="" />
                                    </td>
                                    <td class="excel-cell">
                                        <input type="text" placeholder="รายการย่อย (คั่นด้วย Comma)" value="" />
                                    </td>
                                    <td class="excel-cell" style="text-align: center;">
                                        <button class="btn-icon delete-row-btn"><span class="material-symbols-outlined"
                                                data-icon="delete">delete</span></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Right Section: File Upload & Results -->
                <section class="grid-right right-section">
                    <!-- Upload Card -->
                    <div id="upload-card" class="upload-card">
                        <input type="file" id="pdf-input" accept=".pdf" style="display:none" />
                        <div class="upload-icon-wrapper">
                            <span class="material-symbols-outlined" style="font-size: 2rem;"
                                data-icon="upload_file">upload_file</span>
                        </div>
                        <h4 class="upload-title">อัปโหลดเอกสาร PDF</h4>
                        <p id="upload-desc" class="upload-desc">ลากและวางไฟล์ที่นี่ หรือ <label for="pdf-input" class="text-primary"
                                style="font-weight: 700; cursor: pointer;">เลือกไฟล์</label></p>
                        <p class="upload-note">รองรับเฉพาะไฟล์ .pdf เท่านั้น</p>
                    </div>

                    <!-- Verification Action -->
                    <button id="verify-btn" class="btn-signature">
                        <span class="material-symbols-outlined" data-icon="verified">verified</span>
                        ตรวจสอบ (Check Document)
                    </button>

                    <!-- Results Area -->
                    <div class="results-card">
                        <h3 class="results-header">
                            <span class="material-symbols-outlined" data-icon="analytics"
                                style="font-size: 1.125rem;">analytics</span>
                            ผลการตรวจสอบ
                        </h3>
                        <div id="result-items" class="result-items">
                            <!-- Results will be injected here -->
                        </div>

                        <div class="results-footer">
                            <p class="text-on-surface-variant" style="font-size: 0.75rem;">คะแนนการประเมิน: <span
                                    id="score-value" class="text-on-surface" style="font-weight: 700;">—</span></p>
                        </div>
                    </div>
                </section>

            </div> <!-- end grid-layout -->

        </div>
    </main>

    <script defer src="/static/js/main.js"></script>
</body>

</html>
